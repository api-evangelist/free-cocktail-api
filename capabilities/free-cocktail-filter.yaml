naftiko: 1.0.0-alpha2
info:
  label: Free Cocktail API — Filter
  description: 'Free Cocktail API — Filter. 1 operations. Lead operation: Filter cocktails. Self-contained Naftiko capability
    covering one Free Cocktail Api business surface.'
  tags:
  - Free Cocktail Api
  - Filter
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FREE_COCKTAIL_API_API_KEY: FREE_COCKTAIL_API_API_KEY
capability:
  consumes:
  - type: http
    namespace: free-cocktail-filter
    baseUri: https://www.thecocktaildb.com/api/json/v1/{apiKey}
    description: Free Cocktail API — Filter business capability. Self-contained, no shared references.
    resources:
    - name: filter.php
      path: /filter.php
      operations:
      - name: filtercocktails
        method: GET
        description: Filter cocktails
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: i
          in: query
          type: string
          description: Ingredient to filter by.
        - name: a
          in: query
          type: string
          description: Alcoholic or Non_Alcoholic.
        - name: c
          in: query
          type: string
          description: Category to filter by.
        - name: g
          in: query
          type: string
          description: Glass type to filter by.
  exposes:
  - type: rest
    namespace: free-cocktail-filter-rest
    port: 8080
    description: REST adapter for Free Cocktail API — Filter. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/filter-php
      name: filter-php
      description: REST surface for filter.php.
      operations:
      - method: GET
        name: filtercocktails
        description: Filter cocktails
        call: free-cocktail-filter.filtercocktails
        with:
          i: rest.i
          a: rest.a
          c: rest.c
          g: rest.g
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: free-cocktail-filter-mcp
    port: 9090
    transport: http
    description: MCP adapter for Free Cocktail API — Filter. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: filter-cocktails
      description: Filter cocktails
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: free-cocktail-filter.filtercocktails
      with:
        i: tools.i
        a: tools.a
        c: tools.c
        g: tools.g
      outputParameters:
      - type: object
        mapping: $.
